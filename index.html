<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Downloader 369</title>
    <style>
        :root {
            --neon-cyan: #00FFFF;
            --neon-magenta: #FF00FF;
            --dark-bg: #121212;
            --dark-surface: #1E1E1E;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #FFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
        }
        #app-container {
            width: 100%;
            max-width: 480px; /* Forces mobile portrait view on desktop */
            height: 100%;
            background-color: var(--dark-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        /* Top Navigation */
        header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: transparent;
            margin-top: 10px;
        }
        .title-container {
            display: flex;
            flex-direction: column;
        }
        .app-title {
            color: var(--neon-cyan);
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            line-height: 1.2;
            letter-spacing: 1px;
        }
        .app-subtitle {
            color: #FFF;
            font-size: 14px;
            margin-top: 4px;
        }
        /* Main Content */
        main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }
        .url-input-container {
            width: 100%;
            margin-top: 60px;
            background-color: var(--dark-surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
        }
        .url-input-container span {
            font-size: 20px;
            color: #FFF;
        }
        input[type="url"] {
            flex: 1;
            background: transparent;
            border: none;
            color: #FFF;
            padding: 20px 10px;
            font-size: 16px;
            outline: none;
            width: 100%;
        }
        input::placeholder {
            color: #888;
        }
        .download-btn {
            margin-top: 40px;
            background: transparent;
            color: #FFF;
            border: 2px solid var(--neon-cyan);
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .download-btn:active {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
        }
        .info-text {
            margin-top: 30px;
            color: var(--neon-cyan);
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
            padding: 0 20px;
        }
        /* Bottom Navigation */
        nav.bottom-bar {
            display: flex;
            justify-content: space-around;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 12px 0 20px 0;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
        }
        .nav-item {
            color: var(--neon-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .nav-item.active {
            opacity: 1;
        }
        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <header>
            <div class="title-container">
                <div class="app-title">NEON DOWNLOADER</div>
                <div class="app-subtitle">Apex©</div>
            </div>
            <!-- Menu placeholder block to match UI -->
            <div style="font-size: 24px; color: var(--neon-cyan);">⋮</div>
        </header>

        <main>
            <div class="url-input-container">
                <span>🔗</span>
                <input type="url" id="urlInput" placeholder="Paste URL here..." />
            </div>

            <button class="download-btn" onclick="startDownload()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                DOWNLOAD
            </button>

            <div class="info-text">
                Tap the 🏠︎ icon to log in to able to download from IG or YouTube
            </div>
            
            <div id="download-status" style="margin-top: 20px; color: var(--neon-magenta); text-align: center; display: none; padding: 10px; background: rgba(255,0,255,0.1); border-radius: 8px;"></div>
        </main>

        <nav class="bottom-bar">
            <div class="nav-item active" onclick="switchTab(this)">
                <div class="nav-icon">🏠︎</div>
                Home
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <div class="nav-icon">🌐</div>
                Browser
            </div>
            <div class="nav-item" onclick="switchTab(this)">
                <div class="nav-icon">📁</div>
                Archive
            </div>
        </nav>
    </div>

    <script>
        function startDownload() {
            var url = document.getElementById('urlInput').value;
            var status = document.getElementById('download-status');
            var btn = document.querySelector('.download-btn');
            
            if (url.trim() === '') {
                status.innerText = 'Please enter a valid URL';
                status.style.color = 'var(--neon-magenta)';
                status.style.background = 'rgba(255,0,255,0.1)';
                status.style.display = 'block';
                return;
            }
            
            // Loading state
            btn.innerHTML = '⏳ PROCESSING...';
            status.style.display = 'none';
            
            // Simulate processing time
            setTimeout(() => {
                btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> DOWNLOAD';
                
                status.innerText = 'Web download request received! Connect to your Python/Node.js backend to stream the file.';
                status.style.color = 'var(--neon-cyan)';
                status.style.background = 'rgba(0,255,255,0.1)';
                status.style.display = 'block';
            }, 1500);
        }

        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
